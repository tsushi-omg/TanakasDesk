<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- desk top -->
  <rect x="10" y="20" width="44" height="6" rx="2" fill="#222"/>

  <!-- floating drawer -->
  <rect x="28" y="28" width="10" height="6" rx="1.5" fill="#444"/>
  <circle cx="36" cy="31" r="1" fill="#ddd"/>

  <!-- left surreal leg -->
  <path d="M16 26 C10 38 14 50 18 58"
        stroke="#222"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>

  <!-- right straight leg -->
  <line x1="48" y1="26" x2="50" y2="58"
        stroke="#222"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- tiny surreal dot (tanaka signature vibe) -->
  <circle cx="20" cy="16" r="2" fill="#ff6b6b"/>

</svg>